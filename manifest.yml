modules:
  jira:globalPage:
    - key: standup-settings
      resource: main
      resolver:
        function: resolver
      title: Auto Standup Bot

  scheduledTrigger:
    - key: standup-scheduler
      function: scheduled-handler
      interval: hour

  webtrigger:
    - key: github-oauth-callback
      function: github-callback-handler

  function:
    - key: resolver
      handler: index.handler
    - key: scheduled-handler
      handler: index.scheduledHandler
    - key: github-callback-handler
      handler: index.githubOAuthCallback

resources:
  - key: main
    path: static/standup-ui/build

permissions:
  scopes:
    - read:jira-work
    - read:jira-user
    - storage:app
  external:
    fetch:
      client:
        - address: api.openai.com
        - address: hooks.slack.com
        - address: api.github.com
        - address: github.com
      backend:
        - address: api.openai.com
        - address: hooks.slack.com
        - address: api.github.com
        - address: github.com
        - address: "*.webhook.office.com"
        - address: "*.office.com"
        - address: "*.office365.com"

app:
  id: ari:cloud:ecosystem::app/ddd7df39-862c-46ee-9836-1d72dc6a9e5a
  runtime:
    name: nodejs22.x
  licensing:
    enabled: false
