modules:
  jira:globalPage:
    - key: standup-settings
      resource: main
      resolver:
        function: resolver
      title: Auto Standup Bot

  scheduledTrigger:
    - key: standup-scheduler
      function: scheduled-handler
      interval: hour

  function:
    - key: resolver
      handler: index.handler
    - key: scheduled-handler
      handler: index.scheduledHandler

resources:
  - key: main
    path: static/standup-ui

permissions:
  scopes:
    - read:jira-work
    - read:jira-user
    - storage:app
  external:
    fetch:
      backend:
        - api.openai.com
        - hooks.slack.com

app:
  id: ari:cloud:ecosystem::app/YOUR-APP-ID-HERE
  licensing:
    enabled: true
